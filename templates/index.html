<!DOCTYPE html>
<html>

<head>

<title>Quality Line Checker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f7fb;
}

.card-main{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 25px rgba(0,0,0,.08);
}

.loader-overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,.95);
    z-index:9999;
}

.loader-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card card-main">

                <div class="card-body p-5">

                    <h2 class="mb-3">

                        <i class="bi bi-check2-square"></i>

                        Quality Line Checker

                    </h2>

                    <p class="text-muted">

                        Upload your Excel dataset and paste the activation report below.

                    </p>

                    <form
                        id="reportForm"
                        action="/process"
                        method="POST"
                        enctype="multipart/form-data">

                        <div class="mb-4">

                            <label class="form-label">

                                Excel Dataset

                            </label>

                            <input
                                type="file"
                                name="excel_file"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Report Text

                            </label>

                            <textarea
                                name="report_text"
                                rows="20"
                                class="form-control"
                                required></textarea>

                        </div>
                        {% if error %}
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            {{ error }}
                        </div>
                        {% endif %}

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Process Report

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<div class="loader-overlay" id="loader">

    <div class="loader-content">

        <div class="spinner-border text-primary"
             style="width:4rem;height:4rem">

        </div>

        <h4 class="mt-4">

            Processing Report...

        </h4>

        <p>

            Checking serials and generating results

        </p>

    </div>

</div>

<script>

document
.getElementById('reportForm')
.addEventListener('submit',function(){

    document
    .getElementById('loader')
    .style.display='block';

});

</script>

</body>

</html>
